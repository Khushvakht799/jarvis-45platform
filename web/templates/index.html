<!DOCTYPE html>
<html>
<head>
    <title>Jarvis 3.0 Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/script.js" defer></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Jarvis 3.0 Control Panel</h1>
            <div class="status-bar">
                <span id="node-count">Nodes: 0</span>
                <span id="cache-status">Cache: --</span>
                <span id="distributed-status">Distributed: --</span>
            </div>
        </header>
        
        <nav>
            <a href="/" class="active">Dashboard</a>
            <a href="/memory">Memory</a>
            <a href="/nodes">Nodes</a>
            <a href="/tasks">Tasks</a>
            <a href="/compiler">Compiler</a>
        </nav>
        
        <main>
            <section class="command-panel">
                <h2>Execute Command</h2>
                <form id="command-form">
                    <input type="text" id="command-input" placeholder="Enter command...">
                    <select id="mode-select">
                        <option value="local">Local</option>
                        <option value="distributed">Distributed</option>
                    </select>
                    <button type="submit">Execute</button>
                </form>
                <div id="command-output"></div>
            </section>
            
            <div class="stats-grid">
                <section class="stats-card">
                    <h3>System Health</h3>
                    <div id="system-stats">Loading...</div>
                </section>
                
                <section class="stats-card">
                    <h3>Recent Tasks</h3>
                    <div id="recent-tasks">Loading...</div>
                </section>
                
                <section class="stats-card">
                    <h3>Active Nodes</h3>
                    <div id="active-nodes">Loading...</div>
                </section>
            </div>
            
            <section class="log-panel">
                <h2>System Log</h2>
                <div id="system-log"></div>
            </section>
        </main>
    </div>
</body>
</html>
