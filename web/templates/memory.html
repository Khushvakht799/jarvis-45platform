<!DOCTYPE html>
<html>
<head>
    <title>Jarvis - Memory Explorer</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/script.js" defer></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Jarvis Memory Explorer</h1>
            <div class="status-bar">
                <span id="node-count">Nodes: 0</span>
                <span id="cache-status">Cache: --</span>
            </div>
        </header>
        
        <nav>
            <a href="/">Dashboard</a>
            <a href="/memory" class="active">Memory</a>
            <a href="/nodes">Nodes</a>
            <a href="/tasks">Tasks</a>
            <a href="/compiler">Compiler</a>
        </nav>
        
        <main>
            <section class="memory-controls">
                <button onclick="refreshMemory()">Refresh</button>
                <button onclick="clearMemory()">Clear Memory</button>
                <input type="text" id="memory-search" placeholder="Search commands...">
            </section>
            
            <section class="memory-stats">
                <div id="memory-stats">Loading statistics...</div>
            </section>
            
            <section class="memory-list">
                <h2>Experience History</h2>
                <div id="memory-table">
                    <table>
                        <thead>
                            <tr>
                                <th>Timestamp</th>
                                <th>Command</th>
                                <th>Intent</th>
                                <th>Status</th>
                                <th>Deviation</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="memory-body">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </section>
            
            <section class="best-sequences">
                <h2>Best Sequences</h2>
                <div id="best-sequences"></div>
            </section>
        </main>
    </div>
</body>
</html>
